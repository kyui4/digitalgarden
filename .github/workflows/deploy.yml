name: Deploy to CoreServer

on:
push:
branches:
- main

jobs:
build-and-deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install dependencies
    run: npm ci

  - name: Build site
    run: npm run build

  - name: Show build output
    run: |
      pwd
      ls -la
      find . -maxdepth 2 -type d | sort

  - name: Install lftp
    run: |
      sudo apt-get update
      sudo apt-get install -y lftp

  - name: Upload to CoreServer
    run: |
      lftp -u "${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}" "${{ secrets.FTP_HOST }}" <<EOF
      set ssl:verify-certificate no
      mirror -R --delete ./dist/ /public_html/2t8.net/yusquid/
      quit
      EOF
```
